spring.application.name=DevBrain
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.mbeanregistry.enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState
management.endpoint.health.group.liveness.include=livenessState
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=${project.version:0.0.1-SNAPSHOT}
info.app.description=Repository memory service with Cognee fallback support

dataset.max-zip-size=500MB
dataset.max-entry-size=20MB
dataset.workspace=workspace
dataset.ignored-folders=node_modules,.git,.github,.idea,.vscode,dist,build,target,coverage,out,bin,vendor,__pycache__,.next,.cache
dataset.ignored-extensions=.class,.jar,.war,.exe,.dll,.so,.o,.a,.png,.jpg,.jpeg,.gif,.webp,.ico,.mp4,.mp3,.mov,.zip,.tar,.gz,.7z,.pdf,.doc,.docx,.xlsx,.pptx,.lock,.min.js,.map
dataset.allowed-extensions=.java,.js,.jsx,.ts,.tsx,.py,.go,.rs,.kt,.scala,.php,.rb,.cpp,.c,.h,.cs,.swift,.sql,.html,.css,.scss,.xml,.yaml,.yml,.json,.md,.txt,.properties,.env.example,Dockerfile,.gitignore

cognee.api.base-url=${COGNEE_BASE_URL:https://api.cognee.ai}
cognee.api.key=${COGNEE_API_KEY:}
cognee.api.remember-endpoint=/api/v1/remember
cognee.api.search-endpoint=/api/v1/search
cognee.api.improve-endpoint=/api/v1/remember/entry
cognee.api.forget-endpoint=/api/v1/datasets
cognee.api.graph-endpoint=/api/v1/search
cognee.request.timeout=${COGNEE_REQUEST_TIMEOUT:60s}
cognee.batch.size=${COGNEE_BATCH_SIZE:50}
cognee.max-file-size=${COGNEE_MAX_FILE_SIZE:5MB}
cognee.fallback.failure-threshold=${COGNEE_FALLBACK_FAILURE_THRESHOLD:3}
cognee.fallback.cooldown=${COGNEE_FALLBACK_COOLDOWN:1m}
cognee.fallback.timeout=${COGNEE_FALLBACK_TIMEOUT:60s}
app.cognee.expose-upstream-errors=${COGNEE_EXPOSE_UPSTREAM_ERRORS:false}

# Groq Settings (Using Spring AI OpenAI-compatible client)
spring.ai.openai.base-url=${GROQ_API_BASE:https://api.groq.com/openai/v1}
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.1-8b-instant}
spring.ai.openai.chat.options.temperature=0.1
spring.ai.openai.chat.options.max-tokens=1500

# Graph Visualization Limits
graph.max-nodes=3000
graph.max-links=5000

# Rate Limiting
app.rate-limit.chat=30/min
app.rate-limit.upload=5/hour
app.rate-limit.memory=20/hour

# Resilience4j Defaults
resilience4j.retry.instances.cognee.max-attempts=3
resilience4j.timelimiter.instances.cognee.timeout-duration=30s
resilience4j.circuitbreaker.instances.cognee.failure-rate-threshold=50

# Persistence (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:devbrain;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Exclude unused AI autoconfigurations to prevent startup exceptions when keys are missing
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,\
  org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

# Supabase Auth Config
supabase.url=${SUPABASE_URL:}
supabase.anon.key=${SUPABASE_ANON_KEY:}
supabase.auth.enabled=${SUPABASE_AUTH_ENABLED:false}
