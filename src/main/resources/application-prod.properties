# Production Configuration for DevBrain
# This file overrides default settings when SPRING_PROFILES_ACTIVE=prod

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=10000
server.tomcat.connection-timeout=20000ms

# HTTP Client Compression
server.tomcat.compression=on
server.tomcat.compressable-mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# Session Configuration
server.servlet.session.timeout=30m

# Spring Configuration
spring.application.name=DevBrain
spring.config.import=optional:file:.env[.properties]

# Logging Configuration - Production level
logging.level.root=WARN
logging.level.com.example.DevBrain=INFO
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/devbrain.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.location=/tmp/devbrain-uploads

# Actuator Configuration - Production safe
management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.group.readiness.include=readinessState
management.endpoint.health.group.liveness.include=livenessState
management.info.env.enabled=false
management.health.diskspace.threshold=1GB

# Application Info
info.app.name=${spring.application.name}
info.app.version=${project.version:0.0.1-SNAPSHOT}
info.app.description=Repository memory service with Cognee fallback support

# Database Configuration - Production
# Use PostgreSQL in production instead of H2
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/devbrain}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Dataset Configuration
dataset.max-zip-size=500MB
dataset.max-entry-size=20MB
dataset.workspace=${DATASET_WORKSPACE:/data/workspace}
dataset.ignored-folders=node_modules,.git,.github,.idea,.vscode,dist,build,target,coverage,out,bin,vendor,__pycache__,.next,.cache
dataset.ignored-extensions=.class,.jar,.war,.exe,.dll,.so,.o,.a,.png,.jpg,.jpeg,.gif,.webp,.ico,.mp4,.mp3,.mov,.zip,.tar,.gz,.7z,.pdf,.doc,.docx,.xlsx,.pptx,.lock,.min.js,.map
dataset.allowed-extensions=.java,.js,.jsx,.ts,.tsx,.py,.go,.rs,.kt,.scala,.php,.rb,.cpp,.c,.h,.cs,.swift,.sql,.html,.css,.scss,.xml,.yaml,.yml,.json,.md,.txt,.properties,.env.example,Dockerfile,.gitignore

# Cognee Cloud Integration - Production
cognee.api.base-url=${COGNEE_BASE_URL:https://api.cognee.ai}
cognee.api.key=${COGNEE_API_KEY:}
cognee.api.remember-endpoint=/api/v1/remember
cognee.api.search-endpoint=/api/v1/search
cognee.api.improve-endpoint=/api/v1/remember/entry
cognee.api.forget-endpoint=/api/v1/datasets
cognee.api.graph-endpoint=/api/v1/search
cognee.request.timeout=${COGNEE_REQUEST_TIMEOUT:60s}
cognee.batch.size=${COGNEE_BATCH_SIZE:50}
cognee.max-file-size=${COGNEE_MAX_FILE_SIZE:5MB}
cognee.fallback.failure-threshold=${COGNEE_FALLBACK_FAILURE_THRESHOLD:3}
cognee.fallback.cooldown=${COGNEE_FALLBACK_COOLDOWN:1m}
cognee.fallback.timeout=${COGNEE_FALLBACK_TIMEOUT:60s}
app.cognee.expose-upstream-errors=${COGNEE_EXPOSE_UPSTREAM_ERRORS:false}

# LLM Configuration - Groq Production
spring.ai.openai.base-url=${GROQ_API_BASE:https://api.groq.com/openai/v1}
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.1-8b-instant}
spring.ai.openai.chat.options.temperature=0.1
spring.ai.openai.chat.options.max-tokens=1500

# Graph Visualization - Production Limits
graph.max-nodes=5000
graph.max-links=10000

# Rate Limiting - Production
app.rate-limit.chat=30/min
app.rate-limit.upload=5/hour
app.rate-limit.memory=20/hour

# Resilience Configuration
resilience4j.retry.instances.cognee.max-attempts=3
resilience4j.timelimiter.instances.cognee.timeout-duration=30s
resilience4j.circuitbreaker.instances.cognee.failure-rate-threshold=50

# Supabase Auth Configuration
supabase.url=${SUPABASE_URL:}
supabase.anon.key=${SUPABASE_ANON_KEY:}
supabase.auth.enabled=${SUPABASE_AUTH_ENABLED:false}

# Exclude unused AI autoconfigurations
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,\
  org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

# Security Headers
server.error.whitelabel.enabled=false
